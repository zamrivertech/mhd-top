<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Basics</title>
</head>
<body>
    <script>
        let a = 10;
        let b = 3;
        let c =  2;
        let textsample = "HuHgqtT";

        function add(number) {
            return number + 7;
        }

        function multipy(number1, number2) {
            return number1 * number2;
        }

        function capitalize(text) {
            text = text.toLowerCase();
            
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function lastLetter(text) {
            return text.slice(-1);
        }        

        console.log(add(a));
        console.log(multipy(b, c)); 
        console.log(capitalize(textsample));     
        console.log(lastLetter(textsample));  
    </script>
</body>
</html>
